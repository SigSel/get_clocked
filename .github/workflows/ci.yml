name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'src-tauri/**'
      - 'shared/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --exclude get-clocked

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-path: target/release/bundle/appimage/*.AppImage
          - platform: windows-latest
            artifact-path: target/release/bundle/nsis/*.exe
          - platform: macos-latest
            artifact-path: target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.1
        with:
          version: 'latest'

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: get-clocked-${{ matrix.platform }}
          path: ${{ matrix.artifact-path }}
          retention-days: 7
